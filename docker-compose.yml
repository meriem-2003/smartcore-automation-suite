services:
  mysql:
    image: mysql:8.0
    container_name: smartcore_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Scripts SQL exécutés automatiquement au premier démarrage du container
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - smartcore_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:latest
    container_name: smartcore_n8n
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      # Permet à n8n de se connecter à MySQL via le nom de service "mysql"
      # (utile dès la Semaine 3+, pas exploité activement en Semaine 1)
      DB_TYPE: sqlite
    ports:
      - "${N8N_PORT}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - smartcore_network
    depends_on:
      mysql:
        condition: service_healthy

networks:
  smartcore_network:
    driver: bridge

volumes:
  mysql_data:
  n8n_data: